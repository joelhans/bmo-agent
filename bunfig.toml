[alias]
# Route all Yoga auto imports through our shim that returns a Yoga object
"yoga-wasm-web/auto" = "./tui/yoga-shim.mjs"
# Also cover potential direct ink build imports by exact paths if any remain
"ink/build/styles.js" = "./tui/yoga-shim.mjs"
"ink/build/dom.js" = "./tui/yoga-shim.mjs"
"ink/build/ink.js" = "./tui/yoga-shim.mjs"
"ink/build/reconciler.js" = "./tui/yoga-shim.mjs"
"ink/build/render-node-to-output.js" = "./tui/yoga-shim.mjs"
"ink/build/get-max-width.js" = "./tui/yoga-shim.mjs"

[compile]
assets = []
