# bun build configuration to ensure neo-blessed dynamic deps are included
# and to stub out heavy optional deps we do not use.

[install]
# no special install options

[define]
# Define nothing for now

[resolve]
# Alias term.js and pty.js to local shims so compile does not fail
alias = { "term.js" = "./shims/term.js/index.js", "pty.js" = "./shims/pty.js/index.js" }
